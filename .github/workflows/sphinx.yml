name: Build-sphinx-docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python 3.10
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build HTML
        run: |
          cd docs/
          make html

      - name: Debug Outputs
        run: |
          ls -l $GITHUB_WORKSPACE/docs/_build/html  # Ensure HTML files are generated

      - name: Deploy to gh-pages
        run: |
          set -x
          pip install ghp-import
          ghp-import -n -p -f $GITHUB_WORKSPACE/docs/_build/html
